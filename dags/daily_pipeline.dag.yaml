dag_id: astrotrips_daily_pipeline
schedule: "@daily"
tags: []
default_args: {}
catchup: false
start_date: null
description: "Daily booking ingestion, planet reporting, and data quality validation"

steps:
  ingest:
    blueprint: ingest_bookings
    conn_id: duckdb_astrotrips

  report:
    blueprint: planet_report
    depends_on: [ ingest ]
    conn_id: duckdb_astrotrips

  validate:
    blueprint: data_quality_check
    depends_on: [ report ]

  dag_args-3:
    blueprint: dag_args

  data_quality_check-4:
    blueprint: data_quality_check

  ingest_bookings-5:
    blueprint: ingest_bookings

  planet_report-6:
    blueprint: planet_report

  setup_database-7:
    blueprint: setup_database

  weather_ingest-8:
    blueprint: weather_ingest
    version: 2
