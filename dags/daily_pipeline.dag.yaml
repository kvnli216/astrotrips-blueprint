dag_id: astrotrips_daily_pipeline
schedule: "@daily"
tags: []
default_args: {}
catchup: false
start_date: null
description: "hello"

steps:
  ingest:
    blueprint: ingest_bookings
    conn_id: duckdb_astrotrips
    n_bookings: 5

  report:
    blueprint: planet_report
    depends_on: [ ingest ]
    conn_id: duckdb_astrotrips

  validate:
    blueprint: data_quality_check
    depends_on: [ report ]
    conn_id: duckdb_astrotrips
    table: daily_planet_report
    checks: [ { check_type: null_check, column: planet_name, threshold: 0 }, { check_type: distinct_check, column: planet_name, threshold: 3 }, { check_type: min, column: total_passengers, threshold: 1 } ]

  weather_ingest-6:
    blueprint: weather_ingest
    version: 2
